root = "."
tmp_dir = ".air_tmp"

[build]
cmd = "go build -o ./.air_tmp/server ./cmd/server"
bin = "./.air_tmp/server"
full_bin = "./.air_tmp/server"
include_ext = ["go", "env"]
exclude_dir = [".git", ".idea", ".agents", "docs", "migrations", "storage", "tmp", ".air_tmp"]
exclude_file = []
include_file = [".env"]
exclude_regex = ["_test\\.go"]
delay = 500
stop_on_error = true
send_interrupt = true
kill_delay = "300ms"
rerun = false

[log]
time = true

[misc]
clean_on_exit = true
